<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stock Guru</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="shortcut icon"
      href="assets/stockGuruFavicon.png"
      type="image/x-icon"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="background-grid"></div>
    <header>
      <div class="project-name">
        <h2>Stock.<span>गुरु</span></h2>
        <h3>Stock ka hisab, bilkul laajawab</h3>
      </div>
    </header>
    <section>
      <div class="dashboardCard">
        <h4>Inventory Dashboard</h4>
        <div class="dash_cards">
          <div class="card1">
            <h3>Total Products</h3>
            <h2 id="total-product-value"></h2>
          </div>
          <div class="card2">
            <h3>Low Products</h3>
            <h2 id="low-stock-value">3</h2>
          </div>
          <div class="card3">
            <h3>Out Of Stock</h3>
            <h2 id="out-of-stock-value">7</h2>
          </div>
          <div class="card4">
            <h3>Total Value</h3>
            <h2 id="total-value">20k</h2>
          </div>
        </div>
      </div>
    </section>

    <div class="search-bar">
      <input type="search" placeholder="Enter Item Name" id="searchBar" />
    </div>
    <div class="product-navigator">
      <button onclick="window.location.href='form.html'">Add Item <i class="ri-add-line"></i></button>
      <div class="filter">
        <i class="ri-filter-2-line"></i>
        <h4>Category</h4>
        <select name="categories" id="categories">
          <option value="All">All</option>
          <option value="Accessories">Accessories</option>
          <option value="Electronics">Electronics</option>
          <option value="Stationery">Stationery</option>
          <option value="Networking">Networking</option>
          <option value="Storage">Storage</option>
        </select>
      </div>
      <div class="sort">
        <i class="ri-sort-desc"></i>
        <h4>Sort</h4>
        <select name="categories" id="categories">
          <option value="Name (A–Z)">Name (A–Z)</option>
          <option value="Name (Z–A)">Name (Z–A)</option>
          <option value="Price (Low → High)">Price (Low → High)</option>
          <option value="Price (High → Low)">Price (High → Low)</option>
          <option value="Quantity (Low → High)">Quantity (Low → High)</option>
          <option value="Quantity (High → Low)">Quantity (High → Low)</option>
          <option value="Newest First">Newest First</option>
          <option value="Oldest First">Oldest First</option>
        </select>
      </div>
    </div>

    <section class="products-section">
      <div class="table-container">
        <table class="products-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Product</th>
              <th>Category</th>
              <th>Price</th>
              <th>Quantity</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>

          <tbody id="productTableBody">
            <tr>
              <td>1</td>
              <td>Wireless Mouse</td>
              <td>Accessories</td>
              <td>₹699</td>
              <td>12</td>
              <td><span class="status in-stock">In Stock</span></td>
              <td>
                <button class="edit-btn"><i class="ri-edit-fill"></i></button>
                <button class="delete-btn"><i class="ri-delete-bin-6-fill"></i></button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
    <script src="app.js"></script>
  </body>
</html>

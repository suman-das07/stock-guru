<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Products</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="shortcut icon"
      href="assets/stockGuruFavicon.png"
      type="image/x-icon"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist+Pixel:ELSH@0..80&display=swap"
      rel="stylesheet"
    />

    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="background-grid"></div>
    <main class="form-container">
      <h1 class="geist-pixel">Add Product</h1>

      <form id="productForm">
        <div class="input-group">
          <label for="productName" class="geist-pixel">Product Name</label>
          <input
            type="text"
            id="productName"
            placeholder="Enter product name"
            required
          />
        </div>

        <div class="input-group">
          <label for="category" class="geist-pixel">Category</label>
          <select id="category" required>
            <option value="">Select Category</option>
            <option value="Electronics">Electronics</option>
            <option value="Accessories">Accessories</option>
            <option value="Furniture">Furniture</option>
            <option value="Stationery">Stationery</option>
            <option value="Networking">Networking</option>
            <option value="Storage">Storage</option>
          </select>
        </div>

        <div class="input-group">
          <label class="geist-pixel" for="price">Price (₹)</label>
          <input
            type="number"
            id="price"
            placeholder="Enter price"
            min="0"
            required
          />
        </div>

        <div class="input-group">
          <label class="geist-pixel" for="quantity">Quantity</label>
          <input
            type="number"
            id="quantity"
            placeholder="Enter quantity"
            min="0"
            required
          />
        </div>

        <div class="form-actions">
          <button class="geist-pixel" type="submit" id="submit">Add Product</button>
          <!-- <button type="reset" id="resetBtn">Clear</button> -->
        </div>
      </form>
    </main>
    <script src="app.js"></script>
  </body>
</html>
